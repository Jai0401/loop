<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <style>
      .title { font-size: 26px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 14px; fill: #64748b; }
      .h1 { font-size: 15px; font-weight: 700; fill: #0f172a; }
      .h2 { font-size: 12px; font-weight: 600; fill: #334155; }
      .body { font-size: 11px; fill: #475569; }
      .mono { font-family: 'SF Mono', Monaco, monospace; font-size: 10px; fill: #1e293b; }
      .pill { fill: #f1f5f9; stroke: #cbd5e1; }
      .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; }
      .arrow-active { stroke: #2563eb; stroke-width: 2; fill: none; }
      .arrow-dashed { stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 4 3; fill: none; }
      .node-slack { fill: #4a154b; }
      .node-ai { fill: #d97706; }
      .node-data { fill: #059669; }
      .node-mcp { fill: #2563eb; }
      .node-ui { fill: #7c3aed; }
      .node-text { fill: #ffffff; font-weight: 600; font-size: 13px; }
      .group-bg { fill: #fafbfc; stroke: #e2e8f0; stroke-width: 1; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="40" y="40" class="title">Loop — System Architecture</text>
  <text x="40" y="62" class="subtitle">Slack-native AI memory layer · event ingestion → AI extraction → structured storage → proactive surfacing</text>

  <!-- ============== ROW 1: Slack Workspace ============== -->
  <rect x="40" y="100" width="1320" height="120" rx="8" class="group-bg"/>
  <text x="60" y="128" class="h1">① Slack Workspace</text>
  <text x="60" y="145" class="body">Users post messages · Loop observes everything in real-time</text>

  <g>
    <rect x="80" y="160" width="180" height="48" rx="6" class="node-slack"/>
    <text x="170" y="185" text-anchor="middle" class="node-text">Channel Messages</text>
    <text x="170" y="201" text-anchor="middle" fill="#f5d0fe" font-size="10">message.channels</text>
  </g>
  <g>
    <rect x="290" y="160" width="180" height="48" rx="6" class="node-slack"/>
    <text x="380" y="185" text-anchor="middle" class="node-text">Threads & Replies</text>
    <text x="380" y="201" text-anchor="middle" fill="#f5d0fe" font-size="10">conversations.replies</text>
  </g>
  <g>
    <rect x="500" y="160" width="180" height="48" rx="6" class="node-slack"/>
    <text x="590" y="185" text-anchor="middle" class="node-text">@-mentions of Loop</text>
    <text x="590" y="201" text-anchor="middle" fill="#f5d0fe" font-size="10">app_mention</text>
  </g>
  <g>
    <rect x="710" y="160" width="180" height="48" rx="6" class="node-slack"/>
    <text x="800" y="185" text-anchor="middle" class="node-text">Slash Commands</text>
    <text x="800" y="201" text-anchor="middle" fill="#f5d0fe" font-size="10">/loop search \| decide \| action</text>
  </g>
  <g>
    <rect x="920" y="160" width="180" height="48" rx="6" class="node-slack"/>
    <text x="1010" y="185" text-anchor="middle" class="node-text">Home Tab Opens</text>
    <text x="1010" y="201" text-anchor="middle" fill="#f5d0fe" font-size="10">app_home_opened</text>
  </g>
  <g>
    <rect x="1130" y="160" width="200" height="48" rx="6" class="node-slack"/>
    <text x="1230" y="185" text-anchor="middle" class="node-text">Button Clicks</text>
    <text x="1230" y="201" text-anchor="middle" fill="#f5d0fe" font-size="10">mark_done · extend · search</text>
  </g>

  <!-- ============== ROW 2: Bolt App ============== -->
  <rect x="40" y="260" width="1320" height="120" rx="8" class="group-bg"/>
  <text x="60" y="288" class="h1">② Slack Bolt App (Node.js + TypeScript)</text>
  <text x="60" y="305" class="body">Socket Mode (dev) or HTTP (prod) · strict TS · Zod-validated env · structured Pino logging</text>

  <g>
    <rect x="80" y="320" width="200" height="48" rx="6" fill="#0ea5e9"/>
    <text x="180" y="345" text-anchor="middle" class="node-text">Event Listener</text>
    <text x="180" y="361" text-anchor="middle" fill="#e0f2fe" font-size="10">src/slack/handlers.ts</text>
  </g>
  <g>
    <rect x="310" y="320" width="200" height="48" rx="6" fill="#0ea5e9"/>
    <text x="410" y="345" text-anchor="middle" class="node-text">Thread Context Builder</text>
    <text x="410" y="361" text-anchor="middle" fill="#e0f2fe" font-size="10">batch + replies (≤30)</text>
  </g>
  <g>
    <rect x="540" y="320" width="200" height="48" rx="6" fill="#0ea5e9"/>
    <text x="640" y="345" text-anchor="middle" class="node-text">Slash Commands</text>
    <text x="640" y="361" text-anchor="middle" fill="#e0f2fe" font-size="10">src/slack/slash-commands.ts</text>
  </g>
  <g>
    <rect x="770" y="320" width="200" height="48" rx="6" fill="#0ea5e9"/>
    <text x="870" y="345" text-anchor="middle" class="node-text">Block Kit Publisher</text>
    <text x="870" y="361" text-anchor="middle" fill="#e0f2fe" font-size="10">src/slack/home-tab.ts</text>
  </g>
  <g>
    <rect x="1000" y="320" width="200" height="48" rx="6" fill="#0ea5e9"/>
    <text x="1100" y="345" text-anchor="middle" class="node-text">Proactive Messages</text>
    <text x="1100" y="361" text-anchor="middle" fill="#e0f2fe" font-size="10">surface + follow-up DMs</text>
  </g>

  <!-- ============== ROW 3: AI Brain ============== -->
  <rect x="40" y="420" width="640" height="200" rx="8" class="group-bg"/>
  <text x="60" y="448" class="h1">③ AI Extraction Pipeline</text>
  <text x="60" y="465" class="body">Two paths: LLM via Anthropic Claude (default) · deterministic heuristic (fallback / tests)</text>

  <g>
    <rect x="80" y="485" width="280" height="55" rx="6" class="node-ai"/>
    <text x="220" y="510" text-anchor="middle" class="node-text">Anthropic Claude (tool-use)</text>
    <text x="220" y="527" text-anchor="middle" fill="#fed7aa" font-size="10">claude-sonnet-4-6 · max_tokens=2048</text>
  </g>
  <g>
    <rect x="380" y="485" width="280" height="55" rx="6" class="node-ai"/>
    <text x="520" y="510" text-anchor="middle" class="node-text">Heuristic Fallback</text>
    <text x="520" y="527" text-anchor="middle" fill="#fed7aa" font-size="10">regex · date parse · bigrams</text>
  </g>

  <g>
    <rect x="80" y="555" width="180" height="48" rx="6" fill="#fef3c7" stroke="#fbbf24"/>
    <text x="170" y="578" text-anchor="middle" class="h2">Decisions</text>
    <text x="170" y="593" text-anchor="middle" class="body">summary · rationale · confidence</text>
  </g>
  <g>
    <rect x="280" y="555" width="180" height="48" rx="6" fill="#fef3c7" stroke="#fbbf24"/>
    <text x="370" y="578" text-anchor="middle" class="h2">Action Items</text>
    <text x="370" y="593" text-anchor="middle" class="body">title · owner · due · priority</text>
  </g>
  <g>
    <rect x="480" y="555" width="180" height="48" rx="6" fill="#fef3c7" stroke="#fbbf24"/>
    <text x="570" y="578" text-anchor="middle" class="h2">Topics</text>
    <text x="570" y="593" text-anchor="middle" class="body">1-3 word noun phrases</text>
  </g>

  <!-- ============== ROW 3 right: Storage ============== -->
  <rect x="700" y="420" width="660" height="200" rx="8" class="group-bg"/>
  <text x="720" y="448" class="h1">④ Storage Layer (SQLite + WAL + FTS5)</text>
  <text x="720" y="465" class="body">Single-file, zero-infra · FTS5 for keyword · 256-dim cosine for semantic</text>

  <g>
    <rect x="730" y="485" width="200" height="48" rx="6" class="node-data"/>
    <text x="830" y="510" text-anchor="middle" class="node-text">decisions</text>
    <text x="830" y="526" text-anchor="middle" fill="#a7f3d0" font-size="10">+ decisions_fts + embeddings</text>
  </g>
  <g>
    <rect x="950" y="485" width="200" height="48" rx="6" class="node-data"/>
    <text x="1050" y="510" text-anchor="middle" class="node-text">action_items</text>
    <text x="1050" y="526" text-anchor="middle" fill="#a7f3d0" font-size="10">+ actions_fts + external_refs</text>
  </g>
  <g>
    <rect x="1170" y="485" width="180" height="48" rx="6" class="node-data"/>
    <text x="1260" y="510" text-anchor="middle" class="node-text">messages · users · channels</text>
    <text x="1260" y="526" text-anchor="middle" fill="#a7f3d0" font-size="10">proactive_events · settings</text>
  </g>

  <g>
    <rect x="730" y="555" width="620" height="48" rx="6" fill="#dcfce7" stroke="#86efac"/>
    <text x="1040" y="578" text-anchor="middle" class="h2">Typed Repository (src/storage/repo.ts)</text>
    <text x="1040" y="593" text-anchor="middle" class="body">CRUD · FTS search · cosine similarity · external refs · idempotent migrations</text>
  </g>

  <!-- ============== ROW 4: MCP + UI ============== -->
  <rect x="40" y="660" width="640" height="200" rx="8" class="group-bg"/>
  <text x="60" y="688" class="h1">⑤ MCP Server (Streamable HTTP + stdio)</text>
  <text x="60" y="705" class="body">Stateless · fresh transport per request · protocol 2025-03-26</text>

  <g>
    <rect x="80" y="725" width="180" height="48" rx="6" class="node-mcp"/>
    <text x="170" y="750" text-anchor="middle" class="node-text">Resources</text>
    <text x="170" y="766" text-anchor="middle" fill="#bfdbfe" font-size="10">decisions · actions · search</text>
  </g>
  <g>
    <rect x="280" y="725" width="180" height="48" rx="6" class="node-mcp"/>
    <text x="370" y="750" text-anchor="middle" class="node-text">Templates</text>
    <text x="370" y="766" text-anchor="middle" fill="#bfdbfe" font-size="10">loop://decisions/{id}</text>
  </g>
  <g>
    <rect x="480" y="725" width="180" height="48" rx="6" class="node-mcp"/>
    <text x="570" y="750" text-anchor="middle" class="node-text">Tools</text>
    <text x="570" y="766" text-anchor="middle" fill="#bfdbfe" font-size="10">linear · jira · notion · done · digest</text>
  </g>

  <g>
    <rect x="80" y="795" width="580" height="48" rx="6" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="370" y="818" text-anchor="middle" class="h2">Consumed by Claude Desktop · Cursor · any MCP-aware agent</text>
    <text x="370" y="833" text-anchor="middle" class="body">Read past decisions · create Linear/Jira/Notion from action items · close out actions</text>
  </g>

  <!-- ============== ROW 4 right: Home Tab + Follow-ups ============== -->
  <rect x="700" y="660" width="660" height="200" rx="8" class="group-bg"/>
  <text x="720" y="688" class="h1">⑥ Surfaces (in-Slack)</text>

  <g>
    <rect x="730" y="710" width="300" height="130" rx="6" class="node-ui"/>
    <text x="880" y="740" text-anchor="middle" class="node-text">Block Kit Home Tab</text>
    <text x="880" y="765" text-anchor="middle" fill="#ddd6fe" font-size="11">Recent decisions</text>
    <text x="880" y="783" text-anchor="middle" fill="#ddd6fe" font-size="11">Open actions</text>
    <text x="880" y="801" text-anchor="middle" fill="#ddd6fe" font-size="11">Search modal</text>
    <text x="880" y="819" text-anchor="middle" fill="#ddd6fe" font-size="11">Refresh · Open thread</text>
  </g>

  <g>
    <rect x="1050" y="710" width="300" height="130" rx="6" class="node-ui"/>
    <text x="1200" y="740" text-anchor="middle" class="node-text">Proactive Loop</text>
    <text x="1200" y="765" text-anchor="middle" fill="#ddd6fe" font-size="11">In-thread surface reply</text>
    <text x="1200" y="783" text-anchor="middle" fill="#ddd6fe" font-size="11">DM follow-up (24h cooldown)</text>
    <text x="1200" y="801" text-anchor="middle" fill="#ddd6fe" font-size="11">Mark done / Extend</text>
    <text x="1200" y="819" text-anchor="middle" fill="#ddd6fe" font-size="11">Auto-overdue scheduler</text>
  </g>

  <!-- ============== ARROWS ============== -->
  <!-- Slack row → Bolt row -->
  <path d="M 380 210 L 380 320" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 640 210 L 640 320" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 880 210 L 880 320" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 1100 210 L 1100 320" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Bolt row → AI row -->
  <path d="M 290 368 L 220 485" class="arrow-active" marker-end="url(#arrowhead-blue)"/>
  <path d="M 410 368 L 480 485" class="arrow-active" marker-end="url(#arrowhead-blue)"/>

  <!-- Bolt row → Storage (direct writes) -->
  <path d="M 510 368 L 830 485" class="arrow-dashed" marker-end="url(#arrowhead)"/>

  <!-- AI → Storage -->
  <path d="M 220 540 L 220 555" class="arrow-active" marker-end="url(#arrowhead-blue)"/>
  <path d="M 520 540 L 520 555" class="arrow-active" marker-end="url(#arrowhead-blue)"/>

  <!-- Storage → MCP -->
  <path d="M 1050 603 L 370 725" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Storage → UI (Home Tab + Proactive) -->
  <path d="M 950 555 L 880 710" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 1050 603 L 1200 710" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Bolt → MCP (external agent reads Loop) -->
  <path d="M 1200 368 L 480 725" class="arrow-dashed" marker-end="url(#arrowhead)"/>

  <!-- Legend -->
  <rect x="40" y="875" width="1320" height="0" fill="none"/>
  <text x="40" y="892" class="body" fill="#94a3b8">Solid blue = primary data flow · Solid gray = support flow · Dashed = auxiliary (storage writes from Bolt + MCP consumed by external agents)</text>
</svg>